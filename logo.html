<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Logo Platini Lupas</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0d0d0d;
  font-family: Arial;
}
</style>

</head>

<body>

<!-- LOGO -->
<div style="display:flex;justify-content:center;align-items:center;height:250px;width:100%;position:relative;overflow:hidden;">

  <!-- fundo juliet azul -->
  <div style="
    position:absolute;
    width:400px;
    height:400px;
    background: radial-gradient(circle at 30% 30%, #2aa8ff, #003b73);
    border-radius:50%;
    filter: blur(12px);
    opacity:0.9;
  "></div>

  <!-- formato de óculos -->
  <div style="
    position:absolute;
    width:220px;
    height:70px;
    border:5px solid rgba(0,180,255,0.85);
    border-radius:25px;
    box-shadow:0 0 25px rgba(0,180,255,0.7);
  "></div>

  <!-- texto -->
  <h1 style="
    position:relative;
    color:white;
    font-size:34px;
    letter-spacing:3px;
    font-family:Arial Black;
    text-shadow:0 0 15px rgba(0,180,255,0.9);
  ">
    PLATINI LUPAS
  </h1>

</div>

</body>
</html>
