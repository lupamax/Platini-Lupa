<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Platini Lupas</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

header {
  background: black;
  padding: 20px;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.preco {
  color: gold;
}
</style>
</head>

<body>

<header>
  <h1>PLATINI LUPAS</h1>
  <p>Escolha sua Juliet 👇</p>
</header>

<section class="grid">

<script>
const produtos = [
  {nome:"Juliet Chrome", desc:"Lente espelhada, visão limpa e estilo pesado"},
  {nome:"Juliet Black", desc:"Modelo discreto, combina com tudo"},
  {nome:"Juliet Gold", desc:"Destaque total, chama atenção por onde passa"},
  {nome:"Juliet Azul", desc:"Lente azul, estilo moderno"},
  {nome:"Juliet Vermelha", desc:"Visual agressivo e diferenciado"},
  {nome:"Juliet Prata", desc:"Clássica e elegante"},
  {nome:"Juliet Dark", desc:"Escura, estilo chave"},
  {nome:"Juliet Ice", desc:"Clara, estilo gelo"},
  {nome:"Juliet Neon", desc:"Cor vibrante, presença forte"},
  {nome:"Juliet Smoke", desc:"Fumê, visão confortável"},
  {nome:"Juliet Polarizada", desc:"Proteção contra sol forte"},
  {nome:"Juliet X", desc:"Modelo diferenciado"},
  {nome:"Juliet Pro", desc:"Linha mais avançada"},
  {nome:"Juliet Street", desc:"Estilo rua"},
  {nome:"Juliet Elite", desc:"Acabamento premium"},
  {nome:"Juliet Vision", desc:"Alta nitidez"},
  {nome:"Juliet Max", desc:"Mais robusta"},
  {nome:"Juliet Classic", desc:"Modelo tradicional"},
  {nome:"Juliet Braba", desc:"Visual pesado"},
  {nome:"Juliet Top", desc:"Uma das mais vendidas"}
];

produtos.forEach((p, i) => {
  document.write(`
    <div class="card">
      <a href="produto.html?nome=${p.nome}&img=${i}&desc=${p.desc}" target="_blank">
        <img src="https://picsum.photos/400?random=${i}">
      </a>
      <h3>${p.nome}</h3>
      <p>${p.desc}</p>
      <p class="preco">R$ ${70 + (i % 3)*5}</p>
    </div>
  `)
});
</script>

</section>

</body>
</html>
