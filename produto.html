<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produto</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  text-align: center;
  margin: 0;
}

.container {
  padding: 20px;
}

img {
  width: 90%;
  max-width: 400px;
  margin-top: 20px;
  border-radius: 12px;
}

h1 {
  margin-top: 20px;
}

.desc {
  color: #ccc;
  margin: 10px 0;
}

.preco {
  font-size: 28px;
  color: gold;
  margin: 10px 0;
}

.btn {
  display: inline-block;
  padding: 12px 20px;
  background: gold;
  color: black;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 15px;
}

.voltar {
  display: block;
  margin-top: 20px;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <h1 id="nome"></h1>

  <p class="desc" id="desc"></p>

  <img id="img">

  <p class="preco">R$ 70</p>

  <a class="btn" href="https://wa.me/5512974040166">Comprar no WhatsApp</a>

  <a class="voltar" href="index.html">⬅ Voltar</a>

</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("nome").innerText = params.get("nome");
document.getElementById("desc").innerText = params.get("desc");
document.getElementById("img").src = "https://picsum.photos/600?random=" + params.get("img");
</script>

</body>
</html>
